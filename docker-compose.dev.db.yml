services:
  postgres:
    ports:
      - "5432:5432"
    volumes:
      - dev-postgres-data:/var/lib/postgresql/data

  backend:
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: prophy
      POSTGRES_USER: prophy
      POSTGRES_PASSWORD: prophy
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432

volumes:
  dev-postgres-data: