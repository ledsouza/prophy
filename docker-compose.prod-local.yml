services:
  postgres-prod-local:
    image: postgres:16.6-alpine
    environment:
      POSTGRES_DB: prophy
      POSTGRES_USER: prophy
      POSTGRES_PASSWORD: prophy
    ports:
      - "5433:5432"
    volumes:
      - prod-local-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U prophy -d prophy"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend-prod-local:
    image: prophy-backend:prod
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    depends_on:
      postgres-prod-local:
        condition: service_healthy
      populate-prod-local:
        condition: service_completed_successfully
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: prophy
      POSTGRES_USER: prophy
      POSTGRES_PASSWORD: prophy
      POSTGRES_HOST: postgres-prod-local
      POSTGRES_PORT: 5432
      FRONTEND_URL: http://proxy-prod-local:8080
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,backend-prod-local,proxy-prod-local"
      AUTH_COOKIE_SECURE: "False"
      DJANGO_SETTINGS_MODULE: core.settings.prod_local
    ports:
      - "8001:8080"
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/docs/').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  frontend-prod-local:
    image: prophy-frontend:prod
    build:
      context: .
      dockerfile: frontend/Dockerfile
      target: prod
    depends_on:
      - backend-prod-local
    environment:
      NEXT_PUBLIC_HOST: http://proxy-prod-local:8080
      HOSTNAME: 0.0.0.0
      PORT: 8080
    ports:
      - "3001:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080',res=>process.exit(res.statusCode?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  proxy-prod-local:
    image: nginx:1.27-alpine
    depends_on:
      - frontend-prod-local
      - backend-prod-local
    ports:
      - "8081:8080"
    volumes:
      - ./infra/nginx/prod-local.conf:/etc/nginx/conf.d/default.conf:ro

  populate-prod-local:
    image: prophy-backend:prod
    build:
      context: .
      dockerfile: backend/Dockerfile
      target: prod
    depends_on:
      postgres-prod-local:
        condition: service_healthy
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: prophy
      POSTGRES_USER: prophy
      POSTGRES_PASSWORD: prophy
      POSTGRES_HOST: postgres-prod-local
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: core.settings.prod_local
    volumes:
      - ./backend:/app
    command: ["sh", "-c", "python /app/manage.py migrate && /app/flush_and_populate_db.sh"]

volumes:
  prod-local-postgres-data: