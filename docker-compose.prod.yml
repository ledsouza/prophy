services:
  postgres:
    ports:
      - "5433:5432"
    volumes:
      - prod-postgres-data:/var/lib/postgresql/data

  backend:
    depends_on:
      postgres:
        condition: service_healthy
      seed:
        condition: service_completed_successfully
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: prophy
      POSTGRES_USER: prophy
      POSTGRES_PASSWORD: prophy
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      FRONTEND_URL: http://proxy:8080
      DJANGO_ALLOWED_HOSTS: "127.0.0.1,localhost,backend,proxy"
      AUTH_COOKIE_SECURE: "False"
      DJANGO_SETTINGS_MODULE: core.settings.prod_local
    ports:
      - "8001:8080"
    volumes:
      - prod-media:/app/media
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://localhost:8080/api/docs/').read()",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  frontend:
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_HOST: http://proxy:8080
      HOSTNAME: 0.0.0.0
      PORT: 8080
    ports:
      - "3001:8080"
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "require('http').get('http://localhost:8080',res=>process.exit(res.statusCode?0:1)).on('error',()=>process.exit(1))",
        ]
      interval: 5s
      timeout: 5s
      retries: 12

  proxy:
    depends_on:
      - frontend
      - backend
    ports:
      - "8081:8080"
    volumes:
      - prod-media:/var/www/media:ro
      - ./infra/nginx/app.conf:/etc/nginx/conf.d/default.conf:ro

  seed:
    image: prophy-backend:prod
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_ENGINE: postgres
      POSTGRES_DB: prophy
      POSTGRES_USER: prophy
      POSTGRES_PASSWORD: prophy
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
      DJANGO_SETTINGS_MODULE: core.settings.prod_local
    volumes:
      - ./backend:/app
      - prod-media:/app/media
    command:
      ["sh", "-c", "python /app/manage.py migrate && /app/flush_and_populate_db.sh"]

volumes:
  prod-postgres-data:
  prod-media: