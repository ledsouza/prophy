services:
  proxy:
    ports:
      - "8080:8080"
    volumes:
      - ./infra/nginx/app.dev.conf:/etc/nginx/conf.d/default.conf:ro

  backend:
    environment:
      FRONTEND_URL: http://localhost:8080
      DJANGO_ALLOWED_HOSTS: 127.0.0.1,localhost,backend,proxy

  frontend:
    environment:
      NEXT_PUBLIC_HOST: http://localhost:8080

  cypress:
    environment:
      CYPRESS_BASE_URL: http://proxy:8080
      CYPRESS_API_URL: http://backend:8000/api
    depends_on:
      proxy:
        condition: service_started